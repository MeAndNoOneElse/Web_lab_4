<div class="page-container">
  <header class="header">
    <div class="header-info">
      <div class="info-item"><b>ФИО:</b>Ануфриев Андрей Сергеевич</div>
      <div class="info-item"><b>Группа:</b>P3219</div>
      <div class="info-item"><b>Вариант:</b>48585</div>
    </div>
  </header>

  <main class="main-content">
    <div class="auth-box">
      <h1>Регистрация</h1>
      <p class="subtitle">Создайте новый аккаунт</p>

      <form (ngSubmit)="onRegister()">
        <div class="form-group" [class.has-error]="errors.username">
          <label for="username">
            Имя пользователя
            <span class="required">*</span>
          </label>
          <input
            id="username"
            type="text"
            [(ngModel)]="credentials.username"
            name="username"
            placeholder="Введите имя пользователя"
            [class.error]="errors.username"
            autocomplete="username">
          <div class="error-message" *ngIf="errors.username">
            {{ errors.username }}
          </div>
        </div>

        <div class="form-group" [class.has-error]="errors.email">
          <label for="email">
            Email
            <span class="required">*</span>
          </label>
          <input
            id="email"
            type="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="example@mail.com"
            [class.error]="errors.email"
            autocomplete="email">
          <div class="error-message" *ngIf="errors.email">
            {{ errors.email }}
          </div>
        </div>

        <div class="form-group" [class.has-error]="errors.password">
          <label for="password">

            Пароль
            <span class="required">*</span>
          </label>
          <input
            id="password"
            type="password"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="Минимум 6 символов"
            [class.error]="errors.password"
            autocomplete="new-password">
          <div class="error-message" *ngIf="errors.password">
            {{ errors.password }}
          </div>
        </div>

        <div class="form-group" [class.has-error]="errors.confirmPassword">
          <label for="confirmPassword">
            Подтвердите пароль
            <span class="required">*</span>
          </label>
          <input
            id="confirmPassword"
            type="password"
            [(ngModel)]="credentials.confirmPassword"
            name="confirmPassword"
            placeholder="Повторите пароль"
            [class.error]="errors.confirmPassword"
            autocomplete="new-password">
          <div class="error-message" *ngIf="errors.confirmPassword">
            {{ errors.confirmPassword }}
          </div>
        </div>


        <div class="actions">
          <button type="submit" class="btn-primary">Зарегистрироваться</button>
          <button type="button" class="btn-secondary" (click)="goToLogin()">Уже есть аккаунт?</button>
        </div>
      </form>
    </div>
  </main>
</div>
